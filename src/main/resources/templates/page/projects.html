<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/default :: layout('프로젝트', 'projects', ~{::content})}">
<th:block th:fragment="content">
    <section class="page-hero compact">
        <div class="container">
            <p class="eyebrow">Projects</p>
            <h1>주요 프로젝트</h1>
            <p>백엔드 개발과 인프라 운영을 함께 수행하며 쌓아온 주요 프로젝트 경험을 정리했습니다.</p>
        </div>
    </section>

    <section class="section-block">
        <div class="container card-grid project-grid">
            <article class="info-card project-card" th:each="project : ${projects}">
                <div class="project-card-main">
                    <p class="eyebrow" th:text="${project.category()}">프로젝트 구분</p>
                    <p class="meta" th:text="${project.period()}">기간</p>
                    <h2 th:text="${project.name()}">프로젝트명</h2>
                    <p th:text="${project.summary()}">개요</p>
                    <p><strong>담당 역할:</strong> <span th:text="${project.role()}">역할</span></p>
                </div>
                <div class="project-card-details">
                    <div class="detail-section">
                        <h3>주요 수행 업무</h3>
                        <ul class="bullet-list compact-list">
                            <li th:each="task : ${project.responsibilities()}" th:text="${task}">주요 업무</li>
                        </ul>
                    </div>
                    <div class="chip-list small">
                        <span class="chip" th:each="tech : ${project.techStacks()}" th:text="${tech}">기술</span>
                    </div>
                    <div class="detail-section">
                        <h3>핵심 경험</h3>
                        <ul class="bullet-list compact-list">
                            <li th:each="experience : ${project.keyExperiences()}" th:text="${experience}">핵심 경험</li>
                        </ul>
                    </div>
                </div>
            </article>
        </div>
    </section>
</th:block>
</html>
