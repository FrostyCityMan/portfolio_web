server:
  port: 8080
spring:
  application:
    name: portfolio-web
  profiles:
    active: local
  thymeleaf:
    cache: false
  datasource:
    url: jdbc:h2:mem:portfolio;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  mvc:
    problemdetails:
      enabled: false

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    operations-sorter: method
    tags-sorter: alpha

---
spring:
  config:
    activate:
      on-profile: dev
  datasource:
    url: jdbc:postgresql://localhost:5432/portfolio
    username: portfolio
    password: portfolio
    driver-class-name: org.postgresql.Driver
  thymeleaf:
    cache: false

---
spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: jdbc:postgresql://localhost:5432/portfolio
    username: ${PORTFOLIO_DB_USERNAME:portfolio}
    password: ${PORTFOLIO_DB_PASSWORD:portfolio}
    driver-class-name: org.postgresql.Driver
  thymeleaf:
    cache: true
